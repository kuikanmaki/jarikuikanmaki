<header id="site-header" class="sticky top-0 z-50 w-full border-b border-transparent bg-background transition-colors duration-300">
  <nav class="container-narrow flex h-16 items-center justify-between">
    <a href="#top" class="font-display text-base font-bold uppercase tracking-tight sm:text-lg">
      JARI KUIKANMÄKI
    </a>

    <!-- Desktop nav -->
    <ul class="hidden items-center gap-8 md:flex">
      <li><a href="/origins" class="text-sm font-medium text-muted-foreground hover:text-foreground transition-colors">Origins</a></li>
      <li><a href="https://substack.com/@jarikuikanmaki" target="_blank" rel="noopener noreferrer" class="text-sm font-medium text-muted-foreground hover:text-foreground transition-colors">Substack</a></li>
      <li><a href="mailto:contact@jarikuikanmaki.com" class="text-sm font-medium text-muted-foreground hover:text-foreground transition-colors">Contact / Media</a></li>
    </ul>

    <!-- Hamburger -->
    <button
      id="mobile-menu-toggle"
      type="button"
      aria-label="Toggle menu"
      aria-expanded="false"
      aria-controls="mobile-menu"
      class="flex h-10 w-10 items-center justify-center md:hidden"
    >
      <span class="sr-only">Menu</span>
      <div class="flex flex-col gap-[5px]">
        <span class="bar bar-top block h-px w-6 bg-foreground transition-transform"></span>
        <span class="bar bar-mid block h-px w-6 bg-foreground transition-opacity"></span>
        <span class="bar bar-bot block h-px w-6 bg-foreground transition-transform"></span>
      </div>
    </button>
  </nav>

  <!-- Mobile menu (hidden by default) -->
  <div id="mobile-menu" hidden class="border-t border-border bg-background md:hidden">
    <ul class="container-narrow flex flex-col py-4">
      <li><a href="/origins" class="block py-3 text-base font-medium">Origins</a></li>
      <li><a href="https://substack.com/@jarikuikanmaki" target="_blank" rel="noopener noreferrer" class="block py-3 text-base font-medium">Substack</a></li>
      <li><a href="mailto:contact@jarikuikanmaki.com" class="block py-3 text-base font-medium">Contact / Media</a></li>
    </ul>
  </div>
</header>

<script>
  (function () {
    var btn = document.getElementById('mobile-menu-toggle');
    var menu = document.getElementById('mobile-menu');
    if (!btn || !menu) return;
    btn.addEventListener('click', function () {
      var open = menu.hasAttribute('hidden') ? false : true;
      if (open) {
        menu.setAttribute('hidden', '');
        btn.setAttribute('aria-expanded', 'false');
      } else {
        menu.removeAttribute('hidden');
        btn.setAttribute('aria-expanded', 'true');
      }
    });
  })();
</script>
